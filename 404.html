<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <script>
    // The site used to live under /my-ai-artifacts/ and was moved to the
    // Pages root. Forward any old saved/shared link (e.g. CRS receipt links,
    // whose data lives in the URL hash) to its new location, preserving the
    // query string and hash so no patient data is lost.
    (function () {
      var prefix = "/my-ai-artifacts";
      var path = window.location.pathname;
      if (path.indexOf(prefix) === 0) {
        var dest = path.slice(prefix.length) || "/";
        window.location.replace(dest + window.location.search + window.location.hash);
      }
    })();
  </script>
  <style>
    body { background: #F0F4F8; font-family: 'DM Sans', sans-serif; color: #1F2A37;
           display: flex; min-height: 100vh; margin: 0; align-items: center;
           justify-content: center; text-align: center; padding: 24px; }
    a { color: #0E7C7B; }
  </style>
</head>
<body>
  <div>
    <h1>Page not found</h1>
    <p>The page you’re looking for doesn’t exist. <a href="/">Return to home</a>.</p>
  </div>
</body>
</html>
