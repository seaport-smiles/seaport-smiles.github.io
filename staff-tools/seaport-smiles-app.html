// ── UTILS ─────────────────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}
function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function dayKey(role) { return "ss_" + todayKey() + "_" + role; }
function allDayKeys() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith("ss_2")) keys.push(k);
  }
  return keys;
}
function loadDay(role) {
  try { return JSON.parse(localStorage.getItem(dayKey(role))) || {}; }
  catch { return {}; }
}
function saveDay(role, data) {
  localStorage.setItem(dayKey(role), JSON.stringify(data));
}

// ── CHECKLIST HELPERS ─────────────────────────────────────────────────────────
function buildEmptyChecks(data) {
  const s = {};
  for (const [k, list] of Object.entries(data)) {
    s[k] = {};
    list.sections.forEach((sec, si) => sec.items.forEach((_, ii) => { s[k][si+"-"+ii] = false; }));
  }
  return s;
}
function countItems(data, key) { return data[key].sections.reduce((a, s) => a + s.items.length, 0); }
function countChecked(checks, key) { return Object.values(checks[key] || {}).filter(Boolean).length; }

// ── CHECKLIST COMPONENT ───────────────────────────────────────────────────────
function Checklist({ roleKey, onBack }) {
  const role = ROLES[roleKey];
  const data = role.data;
  const tabs = Object.keys(data);

  // Load today's saved state
  const saved = loadDay(roleKey);
  const [name, setName]     = useState(saved.name || "");
  const [checks, setChecks] = useState(saved.checks || buildEmptyChecks(data));
  const [done, setDone]     = useState(saved.done || {});
  const [fuCounts, setFu]   = useState(saved.fuCounts || {});
  const [active, setActive] = useState(tabs[0]);
  const [exp, setExp]       = useState(() => { const e={}; tabs.forEach(k => { e[k]=data[k].sections.map(()=>true); }); return e; });
  const [toast, setToast]   = useState(null);
  const [nameErr, setNameErr] = useState(false);
  const SLACK_URL = "https://seaportsmiles-group.slack.com/archives/C0AQ7HK0P3P";
  const SLACK_HOOK = ["https://hooks.slack.com/services","T07EBS8SEMV","B0AQH3K9LAG","6kZlRqhjy7fiVbkKtpYQxNFp"].join("/");

  // Auto-save on every state change
  useEffect(() => {
    saveDay(roleKey, { name, checks, done, fuCounts });
  }, [name, checks, done, fuCounts]);

  const list = data[active];
  const total = countItems(data, active);
  const checked = countChecked(checks, active);
  const pct = total ? Math.round((checked/total)*100) : 0;
  const allDone = checked === total;

  function toggle(si, ii) {
    const k = si+"-"+ii;
    setChecks(p => ({ ...p, [active]: { ...p[active], [k]: !p[active][k] } }));
  }
  function toggleSec(si) {
    setExp(p => { const c={...p,[active]:[...p[active]]}; c[active][si]=!c[active][si]; return c; });
  }
  function markDone() {
    if (!name.trim()) { setNameErr(true); return; }
    setNameErr(false);
    const now = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    const today = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
    const entry = { name: name.trim(), at: now };
    setDone(p => ({ ...p, [active]: entry }));
    setToast(list.label + " complete!");
    setTimeout(() => setToast(null), 4000);
    setTimeout(() => window.open(SLACK_URL, "_blank"), 400);
    // Auto-post completion log to Slack
    fetch(SLACK_HOOK, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text: `\u2705 *${name.trim()}* completed *${role.label} \u2014 ${list.label}* at ${now} on ${today}`
      })
    });
  }
  function reset() {
    const fresh = buildEmptyChecks(data);
    setChecks(p => ({ ...p, [active]: fresh[active] }));
    setDone(p => { const c={...p}; delete c[active]; return c; });
  }

  return (
    <div style={S.root}>
      <style>{css}</style>
      {toast && <div style={S.toast}>{toast} -- Photo to Slack</div>}

      {/* HEADER */}
      <div style={{ ...S.header, background: role.grad }}>
        <button onClick={onBack} style={S.backBtn} className="back-btn">&#8592; Roles</button>
        <div style={S.brand}>
          <div style={S.brandName}>Seaport Smiles</div>
          <div style={S.brandSub}>{role.label}</div>
        </div>
        <div style={S.dateChip}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
      </div>

      {/* NAME BAR */}
      <div style={S.nameBar}>
        <span style={S.nameIcon}>\uD83D\uDC64</span>
        <input
          style={{ ...S.nameInput, borderColor: nameErr ? "#EF4444" : "#E2E8F0" }}
          placeholder="Your name (required to complete)"
          value={name}
          onChange={e => { setName(e.target.value); if(e.target.value) setNameErr(false); }}
        />
        {nameErr && <span style={S.nameErr}>Enter your name first</span>}
      </div>

      {/* TABS */}
      <div style={S.tabs}>
        {tabs.map(key => {
          const l=data[key], tot=countItems(data,key), chk=countChecked(checks,key);
          const isAct=active===key, isDone=!!done[key];
          return (
            <button key={key} onClick={()=>setActive(key)}
              style={{...S.tab,...(isAct?{...S.tabActive,borderColor:l.color,color:l.color}:{})}}
              className="tab-btn">
              <span>{l.icon}</span>
              <span style={S.tabTxt}>{l.label}</span>
              <span style={{...S.badge, background:isDone?"#22c55e":isAct?l.color:"#E2E8F0", color:isDone||isAct?"#fff":"#94A3B8"}}>
                {isDone ? "\u2713" : chk+"/"+tot}
              </span>
            </button>
          );
        })}
      </div>

      {/* PROGRESS */}
      <div style={S.content}>
        <div style={S.progWrap}>
          <div style={S.progHead}>
            <span style={{...S.progLabel,color:list.color}}>{list.icon} {list.label} -- {list.time}</span>
            <span style={S.progPct}>{pct}%</span>
          </div>
          <div style={S.track}><div style={{...S.fill,width:pct+"%",background:list.color}}/></div>
          <div style={S.progMeta}>
            <span style={S.progCount}>{checked} of {total} tasks complete</span>
            {done[active] && <span style={{...S.progCount,color:"#22c55e",fontWeight:600}}>&#10003; {done[active].name} &mdash; {done[active].at}</span>}
          </div>
        </div>

        {/* SECTIONS */}
        {list.sections.map((sec, si) => {
          const sChk = sec.items.filter((_,ii) => checks[active][si+"-"+ii]).length;
          const sDone = sChk === sec.items.length;
          const isExp = exp[active][si];
          const fuKey = active+"-"+si;
          return (
            <div key={si} style={S.card}>
              <button style={{...S.cardHead,borderLeftColor:list.color}} onClick={()=>toggleSec(si)} className="card-btn">
                <div style={S.cardL}>
                  <span style={{...S.dot,background:sDone?list.color:"transparent",border:"2px solid "+(sDone?list.color:"#CBD5E1"),color:sDone?"#fff":"transparent"}}>{"\u2713"}</span>
                  <span style={S.cardTitle}>{sec.title}</span>
                </div>
                <div style={S.cardR}>
                  <span style={S.cardCount}>{sChk}/{sec.items.length}</span>
                  <span style={{...S.chev,transform:isExp?"rotate(180deg)":"rotate(0deg)"}}>&#9662;</span>
                </div>
              </button>
              {isExp && (
                <div style={S.items}>
                  {sec.items.map((item,ii) => {
                    const chk = checks[active][si+"-"+ii];
                    return (
                      <button key={ii} style={{...S.item,...(chk?S.itemDone:{})}} onClick={()=>toggle(si,ii)} className="item-btn">
                        <span style={{...S.box,background:chk?list.color:"#fff",borderColor:chk?list.color:"#CBD5E1"}}>
                          {chk && <span style={S.tick}>{"\u2713"}</span>}
                        </span>
                        <span style={{...S.itemTxt,...(chk?S.itemTxtDone:{})}}>{item}</span>
                      </button>
                    );
                  })}
                  {sec.followUpCount && (
                    <div style={S.counter}>
                      <span style={S.counterLbl}>Follow-ups completed:</span>
                      <div style={S.counterRow}>
                        <button style={{...S.cBtn,borderColor:list.color}} onClick={()=>setFu(p=>({...p,[fuKey]:Math.max(0,(p[fuKey]||0)-1)}))} className="counter-btn">-</button>
                        <span style={{...S.cVal,color:list.color}}>{fuCounts[fuKey]||0}</span>
                        <button style={{...S.cBtn,borderColor:list.color}} onClick={()=>setFu(p=>({...p,[fuKey]:(p[fuKey]||0)+1}))} className="counter-btn">+</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}

        {/* FOOTER */}
        <div style={S.footer}>
          {done[active] ? (
            <div style={S.doneBanner}>
              <span>&#10003; Completed by {done[active].name} at {done[active].at}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <a href={SLACK_URL} target="_blank" rel="noreferrer" style={S.slackBtn}>&#128247; Post to Slack</a>
                <button onClick={reset} style={S.resetBtn}>Reset</button>
              </div>
            </div>
          ) : (
            <button onClick={markDone} disabled={!allDone}
              style={{...S.completeBtn,background:allDone?list.color:"#E2E8F0",color:allDone?"#fff":"#94A3B8",cursor:allDone?"pointer":"not-allowed",boxShadow:allDone?"0 4px 20px "+list.color+"44":"none"}}>
              {allDone ? "Mark "+list.label+" Complete -- Photo to Slack" : checked+" of "+total+" tasks complete"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── HISTORY VIEW ──────────────────────────────────────────────────────────────
function HistoryView({ onBack }) {
  const [detail, setDetail] = useState(null); // { dateKey, roleKey, tabKey }

  // Build history from localStorage
  const days = [];
  const dateMap = {};
  allDayKeys().forEach(k => {
    // key format: ss_YYYY-MM-DD_rolekey
    const parts = k.replace("ss_","").split("_");
    const dateKey = parts[0];
    const roleKey = parts[1];
    if (!ROLES[roleKey]) return;
    try {
      const data = JSON.parse(localStorage.getItem(k)) || {};
      if (!dateMap[dateKey]) { dateMap[dateKey] = {}; days.push(dateKey); }
      dateMap[dateKey][roleKey] = data;
    } catch {}
  });
  days.sort((a,b) => b.localeCompare(a));

  function fmtDate(d) {
    const dt = new Date(d + "T12:00:00");
    return dt.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  }

  if (detail) {
    const dayData = dateMap[detail.dateKey]?.[detail.roleKey] || {};
    const role = ROLES[detail.roleKey];
    const tabData = role.data[detail.tabKey];
    const checks = (dayData.checks || {})[detail.tabKey] || {};
    const doneEntry = (dayData.done || {})[detail.tabKey];
    const totalItems = tabData.sections.reduce((a,s)=>a+s.items.length,0);
    const checkedCount = Object.values(checks).filter(Boolean).length;
    return (
      <div style={H.root}>
        <style>{css}</style>
        <div style={H.header}>
          <button onClick={()=>setDetail(null)} style={H.backBtn} className="back-btn">&#8592; Back</button>
          <div>
            <div style={H.headerTitle}>{role.icon} {role.label} &mdash; {tabData.label}</div>
            <div style={H.headerSub}>{fmtDate(detail.dateKey)}</div>
          </div>
        </div>
        <div style={H.body}>
          <div style={{...H.statusBanner, background: doneEntry?"#DCFCE7":"#FEF3C7", borderColor: doneEntry?"#86EFAC":"#FCD34D", color: doneEntry?"#15803D":"#92400E"}}>
            {doneEntry
              ? <span>&#10003; Completed by <strong>{doneEntry.name}</strong> at {doneEntry.at} &mdash; {checkedCount}/{totalItems} items</span>
              : <span>&#9888; Not completed &mdash; {checkedCount}/{totalItems} items checked</span>
            }
          </div>
          {tabData.sections.map((sec,si) => (
            <div key={si} style={H.section}>
              <div style={H.secTitle}>{sec.title}</div>
              {sec.items.map((item,ii) => {
                const chk = checks[si+"-"+ii];
                return (
                  <div key={ii} style={{...H.histItem, background:chk?"#F0FDF4":"#FFF5F5"}}>
                    <span style={{...H.histBox, background:chk?"#22c55e":"#FCA5A5", color:"#fff"}}>{chk?"\u2713":"\u2715"}</span>
                    <span style={{...H.histTxt, color:chk?"#166534":"#991B1B", opacity:chk?1:0.75}}>{item}</span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // List view
  return (
    <div style={H.root}>
      <style>{css}</style>
      <div style={H.header}>
        <button onClick={onBack} style={H.backBtn} className="back-btn">&#8592; Roles</button>
        <div style={H.headerTitle}>Completion History</div>
      </div>
      <div style={H.body}>
        {days.length === 0 && (
          <div style={H.empty}>No history yet. Checklists will appear here once your team starts completing them.</div>
        )}
        {days.map(dateKey => {
          const dayRoles = dateMap[dateKey];
          return (
            <div key={dateKey} style={H.dayBlock}>
              <div style={H.dayHeader}>{fmtDate(dateKey)}</div>
              {Object.entries(dayRoles).map(([roleKey, roleData]) => {
                const role = ROLES[roleKey];
                if (!role) return null;
                const doneMap = roleData.done || {};
                const allTabs = Object.keys(role.data);
                return (
                  <div key={roleKey} style={H.roleCard}>
                    <div style={{...H.roleLabel, color: role.color}}>
                      {role.icon} {role.label}
                      {roleData.name && <span style={H.roleName}> &mdash; {roleData.name}</span>}
                    </div>
                    <div style={H.tabRow}>
                      {allTabs.map(tabKey => {
                        const tab = role.data[tabKey];
                        const entry = doneMap[tabKey];
                        const checks = (roleData.checks||{})[tabKey]||{};
                        const total = tab.sections.reduce((a,s)=>a+s.items.length,0);
                        const chkd = Object.values(checks).filter(Boolean).length;
                        const started = chkd > 0;
                        return (
                          <button key={tabKey}
                            onClick={()=>setDetail({dateKey,roleKey,tabKey})}
                            style={{...H.tabChip,
                              background: entry?"#DCFCE7": started?"#FEF3C7":"#F1F5F9",
                              borderColor: entry?"#86EFAC": started?"#FCD34D":"#E2E8F0",
                              color: entry?"#15803D": started?"#92400E":"#94A3B8"
                            }} className="chip-btn">
                            <span>{entry?"\u2713":started?"...":"\u2013"}</span>
                            <span>{tab.label}</span>
                            {entry
                              ? <span style={H.chipMeta}>{entry.name} {entry.at}</span>
                              : started ? <span style={H.chipMeta}>{chkd}/{total}</span> : null
                            }
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── ROLE SELECTOR ─────────────────────────────────────────────────────────────
function RoleSelector({ onSelect, onHistory }) {
  return (
    <div style={R.root}>
      <style>{css}</style>
      <div style={R.hero}>
        <div style={R.anchor}>&#9875;</div>
        <h1 style={R.title}>Seaport Smiles</h1>
        <p style={R.sub}>Select your role to begin today&apos;s checklist</p>
        <div style={R.date}>{todayStr()}</div>
      </div>
      <div style={R.cards}>
        {Object.entries(ROLES).map(([key, role]) => {
          const saved = loadDay(key);
          const doneCount = Object.keys(saved.done||{}).length;
          const tabTotal = Object.keys(role.data).length;
          return (
            <button key={key} onClick={()=>onSelect(key)} style={R.card} className="role-card">
              <div style={{...R.accent, background:role.color}}/>
              <div style={R.cardBody}>
                <div style={{...R.cardIcon, background:role.color+"18", color:role.color}}>{role.icon}</div>
                <div style={R.cardText}>
                  <div style={R.cardLabel}>{role.label}</div>
                  <div style={R.cardSub}>{role.sub}</div>
                  {saved.name && <div style={{...R.cardSub, color:role.color, marginTop:2}}>&#128100; {saved.name}</div>}
                </div>
                <div style={R.cardRight}>
                  {doneCount > 0 && (
                    <div style={{...R.progressPill, background:doneCount===tabTotal?"#DCFCE7":"#FEF3C7", color:doneCount===tabTotal?"#15803D":"#92400E"}}>
                      {doneCount}/{tabTotal} done
                    </div>
                  )}
                  <span style={{...R.arrow, color:role.color}}>&#8594;</span>
                </div>
              </div>
              <div style={R.pills}>
                {Object.values(role.data).map((tab,i) => (
                  <span key={i} style={{...R.pill, background:role.color+"15", color:role.color}}>{tab.icon} {tab.label}</span>
                ))}
              </div>
            </button>
          );
        })}
      </div>
      <div style={R.histRow}>
        <button onClick={onHistory} style={R.histBtn} className="hist-btn">&#128336; View Completion History</button>
      </div>
      <div style={R.wm}>Seaport Smiles Operations</div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("roles");
  const [role, setRole] = useState(null);
  if (view === "checklist") return <Checklist roleKey={role} onBack={()=>setView("roles")} />;
  if (view === "history")   return <HistoryView onBack={()=>setView("roles")} />;
  return <RoleSelector onSelect={r=>{setRole(r);setView("checklist");}} onHistory={()=>setView("history")} />;
}
